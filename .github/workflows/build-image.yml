name: Build Linux Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom tag (e.g., v2.4.2)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build_linux_amd64:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          GIT_REF="${{ github.ref }}"
          if [ -n "$INPUT_TAG" ]; then
            VERSION="$INPUT_TAG"
          elif [[ "$GIT_REF" == refs/tags/* ]]; then
            VERSION="${GIT_REF#refs/tags/}"
          elif [ "$GIT_REF" = "refs/heads/main" ]; then
            VERSION="$(cat VERSION)"
          else
            VERSION="nightly-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "value=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} for linux/amd64"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}-amd64
            type=raw,value=latest-amd64,enable={{is_default_branch}}

      - name: Build and push Linux amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          cache-from: type=gha,scope=amd64-v2
          cache-to: type=gha,scope=amd64-v2,mode=max

  build_linux_arm64:
    name: Build Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          GIT_REF="${{ github.ref }}"
          if [ -n "$INPUT_TAG" ]; then
            VERSION="$INPUT_TAG"
          elif [[ "$GIT_REF" == refs/tags/* ]]; then
            VERSION="${GIT_REF#refs/tags/}"
          elif [ "$GIT_REF" = "refs/heads/main" ]; then
            VERSION="$(cat VERSION)"
          else
            VERSION="nightly-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "value=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} for linux/arm64"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}-arm64
            type=raw,value=latest-arm64,enable={{is_default_branch}}

      - name: Build and push Linux arm64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          cache-from: type=gha,scope=arm64-v2
          cache-to: type=gha,scope=arm64-v2,mode=max

  create_manifest:
    name: Create multi-arch manifest
    needs: [build_linux_amd64, build_linux_arm64]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          GIT_REF="${{ github.ref }}"
          if [ -n "$INPUT_TAG" ]; then
            VERSION="$INPUT_TAG"
          elif [[ "$GIT_REF" == refs/tags/* ]]; then
            VERSION="${GIT_REF#refs/tags/}"
          elif [ "$GIT_REF" = "refs/heads/main" ]; then
            VERSION="$(cat VERSION)"
          else
            VERSION="nightly-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest (versioned)
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-arm64

      - name: Create and push manifest (latest)
        if: github.ref == 'refs/heads/main' || github.event_name == 'release'
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64

      - name: Image summary
        run: |
          echo "### 🐳 Linux Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
